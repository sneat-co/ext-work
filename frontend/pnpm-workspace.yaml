allowBuilds:
  '@parcel/watcher': true
  '@swc/core': true
  esbuild: true
  less: true
  lmdb: set this to true or false
  msgpackr-extract: set this to true or false
  nx: true
  unrs-resolver: true
minimumReleaseAgeExclude:
  - '@sneat/*'
onlyBuiltDependencies:
  - '@parcel/watcher'
  - '@swc/core'
  - esbuild
  - less
  - nx
  - unrs-resolver
